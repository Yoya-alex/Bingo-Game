{% extends 'game/base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <div style="font-size: 4em; margin-bottom: 20px;">❌</div>
    <h2 style="color: #dc3545; margin-bottom: 20px;">Oops! Something went wrong</h2>
    <p style="font-size: 1.2em; color: #666; margin-bottom: 30px;">{{ error }}</p>
    <a href="https://t.me/YOUR_BOT_USERNAME" style="display: inline-block; padding: 15px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 10px; font-weight: bold;">
        Return to Bot
    </a>
</div>
{% endblock %}
