name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/bingo/Bingo-Game
            git pull origin master
            cd backend
            /opt/bingo/Bingo-Game/backend/.venv/bin/python manage.py migrate
            systemctl restart bingo-web.service bingo-bot.service bingo-engine.service
            systemctl --no-pager --full status bingo-web.service bingo-bot.service bingo-engine.service | head -n 30
